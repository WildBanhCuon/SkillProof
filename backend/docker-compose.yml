services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skillproof
      POSTGRES_PASSWORD: skillproof
      POSTGRES_DB: skillproof
    ports:
      - "54333:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  judge0:
    image: judge0/judge0:1.13.0
    ports:
      - "2358:2358"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

volumes:
  postgres_data:
