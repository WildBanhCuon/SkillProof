services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skillproof
      POSTGRES_PASSWORD: skillproof
      POSTGRES_DB: skillproof
    ports:
      - "54333:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
